name: Flutter CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # Job 1: Analyze & Test
  # ─────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true   # don't fail the build for formatting

      - name: Analyze code (lint)
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test --coverage
        continue-on-error: true   # we'll add tests later

  # ─────────────────────────────────────────
  # Job 2: Build Android APK
  # ─────────────────────────────────────────
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test   # only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java (required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode your keystore from GitHub secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # Create key.properties from GitHub secrets
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build APK (release)
        run: flutter build apk --release

      # Upload APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7